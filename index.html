<!DOCTYPE html>
<html>
<head>
<title>My AI Tutor</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

.header{
    background:#111827;
    color:white;
    padding:20px;
    text-align:center;
}

.chatbox{
    width:90%;
    max-width:700px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

.messages{
    height:350px;
    overflow:auto;
    border-bottom:1px solid #ddd;
}

.bot,.user{
    padding:12px;
    margin:10px;
    border-radius:10px;
}

.bot{
    background:#e5e7eb;
}

.user{
    background:#dbeafe;
    text-align:right;
}

.input-area{
    display:flex;
    gap:10px;
    margin-top:15px;
}

input{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #aaa;
}

button{
    background:#2563eb;
    color:white;
    border:0;
    padding:12px;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="header">
<h1>🤖 My AI Tutor</h1>
<p>Ask anything</p>
</div>


<div class="chatbox">

<div class="messages">

<div class="bot">
🤖 Hello! Main AI Tutor hoon. Apna question pucho.
</div>

</div>


<div class="input-area">
<input placeholder="Type your question...">
<button>Send</button>
</div>


</div>


</body>
</html>
