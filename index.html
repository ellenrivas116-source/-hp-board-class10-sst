<!DOCTYPE html>
<html>
<head>
<title>My AI Assistant</title>

<style>
body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:25px;
}

.chat{
max-width:800px;
margin:auto;
height:500px;
overflow:auto;
padding:20px;
}

.msg{
padding:15px;
margin:10px;
border-radius:10px;
}

.user{
background:#444654;
text-align:right;
}

.ai{
background:#202123;
}

.bottom{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

input{
width:70%;
padding:15px;
border-radius:10px;
border:none;
}

button{
padding:15px;
border-radius:10px;
border:none;
background:#19c37d;
color:white;
}

</style>

</head>

<body>

<div class="header">
🤖 My AI Assistant
</div>


<div class="chat">

<div class="msg ai">
Hello! Main AI Assistant hoon. Kuch bhi pucho.
</div>

</div>


<div class="bottom">
<input placeholder="Message AI...">
<button>Send</button>
</div>


</body>
</html>
